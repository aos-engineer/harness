schema: aos/profile/v1
id: delivery-ops
name: Delivery Ops
description: "Product delivery orchestration. Plans and sequences feature delivery with execution reality checks. A neutral Arbiter orchestrates specialist agents who evaluate feasibility, sequence work, assess risks, and balance speed against quality. Output is a structured memo with a delivery plan, dependencies, risk register, and go/no-go criteria."
version: 1.0.0

assembly:
  orchestrator: arbiter
  perspectives:
    # Core (always active — these four drive delivery planning)
    - agent: strategist
      required: true
    - agent: operator
      required: true
    - agent: catalyst
      required: true
    - agent: architect
      required: true
    # Extended (active by default; can be deactivated)
    - agent: sentinel
      required: false
    - agent: advocate
      required: false
    - agent: navigator
      required: false

delegation:
  default: broadcast
  opening_rounds: 1
  tension_pairs:
    - [strategist, operator]
    - [catalyst, sentinel]
    - [architect, catalyst]
  bias_limit: 5

constraints:
  time:
    min_minutes: 2
    max_minutes: 8
  budget:
    min: 1.00
    max: 8.00
    currency: USD
  rounds:
    min: 2
    max: 6

error_handling:
  agent_timeout_seconds: 120
  retry_policy:
    max_retries: 2
    backoff: exponential
  on_agent_failure: skip
  on_orchestrator_failure: save_transcript_and_exit
  partial_results: include_with_status_flag

budget_estimation:
  strategy: rolling_average
  fixed_estimate_tokens: 2000
  safety_margin: 0.15
  on_estimate_exceeded: drop_optional

input:
  format: brief
  required_sections:
    - heading: "## Deliverable"
      guidance: "What needs to be delivered? Describe the feature, product, or milestone in concrete terms."
    - heading: "## Current State"
      guidance: "Where are things now? What has been built, what is in progress, what is blocked."
    - heading: "## Resources"
      guidance: "Team size, skills available, budget, infrastructure, and any hard constraints."
    - heading: "## Key Question"
      guidance: "The single most important delivery question you want the team to answer. Be specific."
  context_files: true

output:
  format: memo
  path_template: "output/memos/{{date}}-{{brief_slug}}-{{session_id}}/memo.md"
  sections:
    - delivery_plan
    - sequence_and_dependencies
    - risk_register
    - resource_allocation
    - milestones
    - go_no_go_criteria
  artifacts:
    - type: diagram
  frontmatter:
    - date
    - duration
    - budget_used
    - participants
    - brief_path
    - transcript_path

expertise:
  enabled: true
  path_template: "expertise/{{agent_id}}-notes.md"
  mode: per-agent

controls:
  halt: true
  wrap: true
  interject: false
