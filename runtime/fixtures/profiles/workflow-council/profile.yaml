schema: aos/profile/v1
id: workflow-council
name: Workflow Council
description: "Test profile with workflow field"
version: 1.0.0

workflow: execution-workflow

assembly:
  orchestrator: arbiter
  perspectives:
    - agent: catalyst
      required: true
      role_override: "lead analyst"
    - agent: advocate
      required: true
    - agent: strategist
      required: false
    - agent: architect
      required: true
    - agent: operator
      required: true

delegation:
  default: broadcast
  opening_rounds: 1
  tension_pairs: []
  bias_limit: 5

constraints:
  time:
    min_minutes: 1
    max_minutes: 10
  budget:
    min: 0.50
    max: 10.00
    currency: USD
  rounds:
    min: 1
    max: 6

error_handling:
  agent_timeout_seconds: 60
  retry_policy:
    max_retries: 1
    backoff: exponential
  on_agent_failure: skip
  on_orchestrator_failure: save_transcript_and_exit
  partial_results: include_with_status_flag

budget_estimation:
  strategy: fixed_estimate
  fixed_estimate_tokens: 2000
  safety_margin: 0.15
  on_estimate_exceeded: warn_arbiter

input:
  format: brief
  required_sections:
    - heading: "## Situation"
      guidance: "What is happening right now?"
  context_files: true

output:
  format: memo
  path_template: "output/memos/{{date}}-{{brief_slug}}-{{session_id}}/memo.md"
  sections: [ranked_recommendations]
  artifacts: []
  frontmatter: [date, duration, budget_used, participants]

expertise:
  enabled: false
  path_template: ""
  mode: none

controls:
  halt: true
  wrap: true
  interject: false
